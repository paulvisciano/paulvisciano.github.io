    <script>
        // Load and display fingerprint + date from this memory's JSON (desktop overlay + mobile drawer)
        (async () => {
            const hashElement = document.getElementById('fingerprint-hash');
            const drawerHashEl = document.getElementById('drawer-fingerprint-hash');
            const mvEl = document.getElementById('memory-version');
            const drawerMv = document.getElementById('drawer-memory-version');
            const setHash = (el, text, full) => { if (el) { el.textContent = text; el.title = full || text; } };
            const setDate = (text) => {
                const t = (text || '—').trim();
                if (mvEl) mvEl.textContent = t;
                if (drawerMv) drawerMv.textContent = t;
            };
            const copyHash = (el) => {
                if (!el) return;
                const fullHash = el.title || el.textContent;
                if (fullHash && fullHash !== '—') {
                    navigator.clipboard.writeText(fullHash).then(() => {
                        const t = el.textContent;
                        el.textContent = 'Copied!';
                        el.style.color = '#22c55e';
                        setTimeout(() => { el.textContent = t; el.style.color = ''; }, 1200);
                    }).catch(() => {});
                }
            };
            const countEl = document.getElementById('drawer-neurons-synapses');
            const setCount = (n, s) => {
                if (!countEl) return;
                if (n != null || s != null) countEl.textContent = (n != null ? n : '—') + ' neurons · ' + (s != null ? s : '—') + ' synapses';
                else countEl.textContent = '—';
            };
            try {
                let response = await fetch('./fingerprint.json');
                if (!response.ok) response = await fetch('./data/fingerprint.json');
                const fingerprint = await response.json();
                const fullHash = fingerprint.hash || fingerprint.masterHash || '';
                setHash(hashElement, fullHash || '—', fullHash || undefined);
                setHash(drawerHashEl, fullHash || '—', fullHash || undefined);
                if (fingerprint.lastSynced) setDate(fingerprint.lastSynced);
                else {
                    try {
                        const vRes = await fetch('./memory-version.json');
                        if (vRes.ok) {
                            const v = await vRes.json();
                            setDate(v.last_updated || v.timestamp || v.version || '—');
                        } else setDate('—');
                    } catch (_) { setDate('—'); }
                }
                setCount(fingerprint.neurons, fingerprint.synapses);
            } catch (e) {
                console.log('Could not load fingerprint:', e.message);
                setDate('—');
                setCount(null, null);
            }
            if (hashElement) {
                hashElement.addEventListener('dblclick', () => {
                    const fullHash = hashElement.title || hashElement.textContent;
                    if (fullHash && fullHash !== '—') {
                        navigator.clipboard.writeText(fullHash).then(() => {
                            const t = hashElement.textContent;
                            const prevColor = hashElement.style.color;
                            const prevBg = hashElement.style.background;
                            const prevPadding = hashElement.style.padding;
                            const prevFontWeight = hashElement.style.fontWeight;
                            hashElement.textContent = 'Copied!';
                            hashElement.style.color = '#22c55e';
                            hashElement.style.background = 'rgba(34, 197, 94, 0.25)';
                            hashElement.style.padding = '2px 6px';
                            hashElement.style.fontWeight = 'bold';
                            setTimeout(() => {
                                hashElement.textContent = t;
                                hashElement.style.color = prevColor;
                                hashElement.style.background = prevBg;
                                hashElement.style.padding = prevPadding;
                                hashElement.style.fontWeight = prevFontWeight;
                            }, 1200);
                        }).catch(() => {});
                    }
                });
            }
            if (drawerHashEl) drawerHashEl.addEventListener('dblclick', () => copyHash(drawerHashEl));
        })();
    </script>
